<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RevEngine{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #39FF14;
      --primary-dark: #32e012;
      --accent: #ccff00;
      --bg: #000000;
      --surface: #0a0a0a;
      --surface2: #121212;
      --text: #ffffff;
      --text-muted: #b0b0b0;
      --border: #1f1f1f;
      --success: #39FF14;
      --danger: #ff3131;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    ::selection {
      background: var(--primary);
      color: #000;
    }
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand { font-weight: 700; color: var(--primary) !important; font-size: 1.3rem; text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }
    .nav-link { color: var(--text-muted) !important; }
    .nav-link:hover { color: var(--text) !important; }
    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      font-weight: 500;
    }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
    .btn-outline-danger { color: var(--danger); border-color: var(--danger); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform .2s, box-shadow .2s;
    }
    .metric-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(57, 255, 20, 0.2); border-color: var(--primary); }
    .metric-value { font-size: 2.2rem; font-weight: 700; color: var(--primary); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
    .metric-label { color: var(--text-muted); font-size: .875rem; margin-top: .25rem; }
    .table { color: var(--text); }
    .table thead th { color: var(--text-muted); border-color: var(--border); font-weight: 500; font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; }
    .table td { border-color: var(--border); vertical-align: middle; }
    .table-hover tbody tr:hover { background: var(--surface2); }
    .form-control, .form-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface2);
      border-color: var(--primary);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(108,99,255,.25);
    }
    .form-label { font-weight: 500; color: var(--text-muted); font-size: .9rem; }
    .alert-danger { background: rgba(248,113,113,.1); border-color: var(--danger); color: var(--danger); }
    .alert-success { background: rgba(74,222,128,.1); border-color: var(--success); color: var(--success); }
    .badge-cohort { background: rgba(108,99,255,.2); color: var(--primary); border-radius: 20px; padding: .25rem .75rem; font-size: .8rem; }
    .page-header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .page-header h1 { font-weight: 700; font-size: 1.75rem; margin: 0; }
    a { color: var(--primary); }
    a:hover { color: var(--primary-dark); }
  </style>
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-qr-code-scan me-2"></i>RevEngine</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        {% if user.is_admin %}
          <li class="nav-item"><a class="nav-link" href="/admin-dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/tenants"><i class="bi bi-building me-1"></i>Tenants</a></li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="/cliente-dashboard"><i class="bi bi-house me-1"></i>Início</a></li>
          <li class="nav-item"><a class="nav-link" href="/gerar-qr"><i class="bi bi-qr-code me-1"></i>Gerar QR</a></li>
        {% endif %}
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>{{ user.username }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end" style="background:var(--surface2);border-color:var(--border);">
            <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<div class="container pb-5">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
