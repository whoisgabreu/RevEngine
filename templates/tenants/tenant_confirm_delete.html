{% extends 'base.html' %}
{% block title %}Excluir Tenant — RevEngine{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--danger)"></i>
      <h2 class="fw-bold mt-3" style="font-size:1.3rem;">Excluir Tenant</h2>
      <p class="text-muted">Deseja realmente excluir o tenant <strong>{{ tenant.name }}</strong>?<br>
      Todos os leads e visitas vinculados serão removidos.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
          <i class="bi bi-trash me-2"></i>Excluir
        </button>
        <a href="/admin/tenants" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
