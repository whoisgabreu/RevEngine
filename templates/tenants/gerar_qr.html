{% extends 'base.html' %}
{% block title %}Gerar QR Code — {{ tenant.name }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="bi bi-qr-code-scan me-2" style="color:var(--primary)"></i>QR Code Gerado</h1>
  <p class="text-muted mb-0">Tenant: <strong>{{ tenant.name }}</strong>
    {% if valor %} &nbsp;|&nbsp; Valor: <strong style="color:var(--success)">R$ {{ valor }}</strong>{% endif %}
  </p>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div style="background:#fff;border-radius:12px;padding:1.5rem;display:inline-block;margin:0 auto;">
        <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code" style="width:240px;height:240px;">
      </div>
      <p class="text-muted small mt-3 mb-1">URL de scan:</p>
      <code style="background:var(--surface2);padding:.5rem .75rem;border-radius:8px;display:block;word-break:break-all;font-size:.8rem;">{{ scan_url }}</code>
      <div class="d-flex gap-2 mt-4 justify-content-center">
        <a href="/gerar-qr" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-2"></i>Gerar outro
        </a>
        <a href="/cliente-dashboard" class="btn btn-primary">
          <i class="bi bi-house me-2"></i>Início
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
